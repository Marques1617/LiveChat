services:
  db:
    container_name: livechat
    image: postgres:latest
    environment:
      POSTGRES_USER: marques
      POSTGRES_PASSWORD: 123
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5331:5432"
    networks:
      - db
    restart: unless-stopped
  
networks:
  db:
    driver: bridge

volumes:
  db:
    
    
