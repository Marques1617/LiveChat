<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat - Build & Run</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
</head>

<body class="bg-body-tertiary">

<div class="container py-5">
    <div class="card shadow-lg mx-auto" style="max-width: 700px; height: 80vh;">

        <!-- Header -->
        <div class="card-header text-center fw-bold">
            Build & Run Chat
        </div>

        <!-- Messages -->
        <div id="chat-box" class="card-body overflow-auto" style="background-color:#f8f9fa;">
            <ul id="livechat" class="list-unstyled mb-0"></ul>
        </div>

        <!--Toggle Button to connect-->
        <div class="card-header text-center fw-bold">
                <a class="btn btn-lg btn-primary" href="#" role="button" id="connect">Connect
                &raquo;</a>
            <a class="btn btn-lg btn-primary disabled" href="#" role="button" id="disconnect">Disconnect
                    &raquo;</a>
        </div>

        <!-- Input -->
        <div class="card-footer">
            <form id="messageForm" class="d-flex gap-2">
                <input type="text"
                       id="message"
                       class="form-control"
                       placeholder="Type your message..."
                       autocomplete="off"
                       required>
                <button id="send" class="btn btn-primary" type="submit">
                    Send
                </button>
            </form>
        </div>

    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const username = /*[[${username}]]*/ 'defaultUser';
    /*]]>*/
</script>

<script th:src="@{/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
